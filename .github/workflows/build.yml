name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: cim-windows-x86_64
          path: target/release/cim.exe
          if-no-files-found: error

  linux-glibc228:
    name: Linux (x86_64, glibc 2.28)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build inside Debian buster so the ELF only needs symbols up to
      # GLIBC_2.28 (runs on RHEL 8 / Debian 10 / Ubuntu 18.04 and newer).
      - name: Build release in Debian buster
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e CARGO_TARGET_DIR=/work/target/linux \
            debian:buster bash ci/build-linux-glibc228.sh
      - uses: actions/upload-artifact@v4
        with:
          name: cim-linux-x86_64-glibc2.28
          path: target/linux/release/cim
          if-no-files-found: error
